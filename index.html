<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abhishek Gupta</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f9f7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    overflow: hidden;
    background: #e5e5e0;
    flex-shrink: 0;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .info {
    text-align: center;
  }

  .info h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #111;
  }

  .info p {
    margin-top: 6px;
    font-size: 0.9rem;
    color: #666;
    line-height: 1.5;
  }

  .location {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    font-size: 0.82rem;
    color: #999;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: #fff;
    border: 1px solid #e8e8e4;
    border-radius: 12px;
    text-decoration: none;
    color: #1a1a1a;
    font-size: 0.92rem;
    font-weight: 500;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  }

  .link-btn:hover {
    border-color: #ccc;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    transform: translateY(-1px);
  }

  .link-btn:active {
    transform: translateY(0);
  }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-linkedin { background: #0a66c2; }
  .icon-github   { background: #24292f; }

  .icon svg { width: 18px; height: 18px; fill: #fff; }

  .link-label { flex: 1; }
  .link-sub {
    display: block;
    font-size: 0.75rem;
    color: #999;
    font-weight: 400;
    margin-top: 1px;
  }

  .arrow {
    color: #ccc;
    font-size: 1rem;
  }

  footer {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="card">

  <div class="avatar">
    <img src="https://raw.githubusercontent.com/blpabhishek/image/refs/heads/main/Abhishek-1.jpg" alt="Abhishek Gupta" onerror="this.style.display='none'" />
  </div>

  <div class="info">
    <h1>Abhishek Gupta</h1>
    <p>Software Engineer · Building things that matter</p>
    <span class="location">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Melbourne, Australia
    </span>
  </div>

  <div class="links">

    <a class="link-btn" href="https://www.linkedin.com/in/blpabhishek/" target="_blank" rel="noopener">
      <div class="icon icon-linkedin">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </div>
      <span class="link-label">
        LinkedIn
        <span class="link-sub">linkedin.com/in/blpabhishek</span>

      <span class="arrow">›</span>

      </div>
      <span class="link-label">
        GitHub
        <span class="link-sub">github.com/blpabhishek</span>
      </span>
      <span class="arrow">›</span>
    </a>

  </div>

  <footer>abhishek · melbourne</footer>
</div>
</body>
</html>
